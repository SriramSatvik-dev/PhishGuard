<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #ffffff;
    }

    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #1e2130;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header-sub {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }

    .body { padding: 20px; }

    /* URL display */
    .url-box {
      background: #1a1d2e;
      border: 1px solid #1e2130;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      color: #9ca3af;
      word-break: break-all;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* Verdict card */
    .verdict-card {
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      display: none;
    }

    .verdict-card.red    { background: #2d1515; border: 1px solid #7f1d1d; }
    .verdict-card.orange { background: #2d1f0f; border: 1px solid #7c3a00; }
    .verdict-card.green  { background: #0f2d1a; border: 1px solid #14532d; }

    .verdict-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .red    .verdict-label { color: #f87171; }
    .orange .verdict-label { color: #fb923c; }
    .green  .verdict-label { color: #4ade80; }

    .verdict-text {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .red    .verdict-text { color: #ef4444; }
    .orange .verdict-text { color: #f97316; }
    .green  .verdict-text { color: #22c55e; }

    .risk-score {
      font-size: 12px;
      color: #9ca3af;
    }

    /* Score bar */
    .score-bar-track {
      height: 6px;
      background: #1e2130;
      border-radius: 3px;
      margin-top: 10px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .red    .score-bar-fill { background: #ef4444; }
    .orange .score-bar-fill { background: #f97316; }
    .green  .score-bar-fill { background: #22c55e; }

    /* Flags list */
    .flags-section {
      display: none;
      margin-bottom: 16px;
    }

    .flags-title {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .flag-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      color: #d1d5db;
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .flag-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f87171;
      flex-shrink: 0;
      margin-top: 5px;
    }

    /* Scan button */
    .scan-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .scan-btn:hover    { background: #2563eb; }
    .scan-btn:disabled {
      background: #1e2130;
      color: #4b5563;
      cursor: not-allowed;
    }

    /* Loading state */
    .loading {
      display: none;
      text-align: center;
      padding: 20px 0;
      color: #6b7280;
      font-size: 13px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #1e2130;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error state */
    .error-box {
      display: none;
      background: #2d1515;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      color: #f87171;
      margin-bottom: 16px;
    }

    .footer {
      padding: 12px 20px;
      border-top: 1px solid #1e2130;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-link {
      font-size: 11px;
      color: #3b82f6;
      text-decoration: none;
      cursor: pointer;
    }

    .footer-status {
      font-size: 11px;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="header-title">🛡️ PhishGuard</div>
      <div class="header-sub">ML-powered phishing detection</div>
    </div>
  </div>

  <div class="body">

    <div class="url-box" id="urlDisplay">Loading current page URL...</div>

    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      Analysing URL...
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="verdict-card" id="verdictCard">
      <div class="verdict-label" id="verdictLabel"></div>
      <div class="verdict-text" id="verdictText"></div>
      <div class="risk-score" id="riskScore"></div>
      <div class="score-bar-track">
        <div class="score-bar-fill" id="scoreBar" style="width: 0%"></div>
      </div>
    </div>

    <div class="flags-section" id="flagsSection">
      <div class="flags-title">Why this verdict</div>
      <div id="flagsList"></div>
    </div>

    <button class="scan-btn" id="scanBtn">Scan This Page</button>

  </div>

  <div class="footer">
    <span class="footer-status" id="footerStatus">Ready</span>
    <a class="footer-link" id="dashboardLink">Open Dashboard →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
